<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A0826D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5344;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="800" height="600" fill="url(#skyGradient)"/>
  
  <!-- Mountains -->
  <polygon points="0,400 150,200 300,400" fill="url(#mountainGradient1)" opacity="0.8"/>
  <polygon points="200,400 400,150 600,400" fill="url(#mountainGradient2)"/>
  <polygon points="500,400 700,250 800,400" fill="url(#mountainGradient1)" opacity="0.9"/>
  
  <!-- Snow caps -->
  <polygon points="150,200 170,240 130,240" fill="white" opacity="0.9"/>
  <polygon points="400,150 430,210 370,210" fill="white" opacity="0.85"/>
  <polygon points="700,250 720,290 680,290" fill="white" opacity="0.9"/>
  
  <!-- Simple clouds -->
  <ellipse cx="100" cy="80" rx="45" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="135" cy="90" rx="40" ry="20" fill="white" opacity="0.6"/>
  <ellipse cx="650" cy="120" rx="50" ry="30" fill="white" opacity="0.65"/>
  <ellipse cx="700" cy="130" rx="45" ry="25" fill="white" opacity="0.55"/>
</svg>
